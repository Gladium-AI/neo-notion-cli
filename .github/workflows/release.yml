name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MODULE="github.com/paoloanzn/neo-notion-cli"

          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X ${MODULE}/internal/version.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X ${MODULE}/internal/version.Commit=${COMMIT}"
          LDFLAGS="${LDFLAGS} -X ${MODULE}/internal/version.Date=${DATE}"

          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/notion .

      - name: Package archive
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          ARCHIVE="notion-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "dist/${ARCHIVE}" -C dist notion
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/${ARCHIVE}" \
            --clobber
